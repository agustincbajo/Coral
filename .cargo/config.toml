# Repo-scoped cargo config. Applies to every contributor working in
# this checkout; complements (does not override) `~/.cargo/config.toml`.
#
# The matching disk-management mechanics (cargo-sweep, sccache, etc.)
# are documented in `docs/DEVELOPMENT.md` and bootstrappable via
# `scripts/dev-setup.{sh,ps1}`.

[build]
# Incremental compilation is intentionally off for this workspace.
#
# Why: incremental caches live in `target/<profile>/incremental/` and
# accumulate across feature combinations + branches. During the
# v0.32.x WebUI sprint we measured `target/` growing past 35 GB in a
# single 8h session — the incremental cache was ~30% of that. Cargo
# does not garbage-collect incremental artifacts automatically.
#
# Trade-off: first build after a `cargo clean` or after switching
# branches is ~30% slower (no incremental reuse). All subsequent
# builds in the same session benefit from the in-process query cache
# anyway. CI already runs with `CARGO_INCREMENTAL=0` so this aligns
# local and CI behavior.
#
# If you specifically want incremental on for a hot iteration loop,
# override with: `CARGO_INCREMENTAL=1 cargo build`
incremental = false
