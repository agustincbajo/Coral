[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.21.3"
edition = "2024"
rust-version = "1.85"
license = "MIT"
authors = ["Agustín Bajo <agustinbajo@gmail.com>"]
repository = "https://github.com/agustincbajo/Coral"
description = "Karpathy-style LLM Wiki maintainer for Git repos"

[workspace.dependencies]
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml_ng = "0.10"
regex = "1"
walkdir = "2"
rayon = "1.10"
chrono = { version = "0.4", features = ["serde"] }
ahash = "0.8"
thiserror = "2"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
include_dir = "0.7"
toml = "0.8"
tempfile = "3"
assert_fs = "1"
fs4 = "0.13"
predicates = "3"
assert_cmd = "2"
schemars = { version = "0.8", features = ["chrono"] }
# v0.21.1: HTTP/SSE MCP transport (Streamable HTTP per MCP 2025-11-25).
# Picked tiny-http over hyper/axum because the MCP HTTP transport is a
# small, blocking-I/O surface — POST /mcp + GET /mcp + DELETE /mcp —
# and tiny-http is single-purpose, dep-light, and has no async runtime
# dragging the rest of the workspace into tokio. This is the only new
# dep in v0.21.1 (justified in the orchestrator's spec §4).
tiny_http = "0.12"
coral-core = { path = "crates/coral-core", version = "0.21.3" }
coral-env = { path = "crates/coral-env", version = "0.21.3" }
coral-lint = { path = "crates/coral-lint", version = "0.21.3" }
coral-runner = { path = "crates/coral-runner", version = "0.21.3" }
coral-session = { path = "crates/coral-session", version = "0.21.3" }
coral-stats = { path = "crates/coral-stats", version = "0.21.3" }
coral-test = { path = "crates/coral-test", version = "0.21.3" }
coral-mcp = { path = "crates/coral-mcp", version = "0.21.3" }

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
opt-level = 3
panic = "abort"
