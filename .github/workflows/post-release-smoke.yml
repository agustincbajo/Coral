name: Post-release smoke

# v0.34.0 onboarding (PRD §6.8 FR-ONB-23 + §6.10 FR-ONB-32 +
# docs/SMOKE-TESTS.md): the moment a GitHub Release is published,
# walk through the install -> self-check -> self-upgrade --check-only
# flow on a fresh runner for each supported OS. Failures here block
# promoting the tag to `latest` (the release manager flips that flag
# manually after this workflow goes green).
#
# Why a separate workflow instead of bolting onto `release.yml`?
#   * release.yml runs BEFORE the binary is uploaded; we need to
#     install via the published artifacts, which only exist after the
#     release is published.
#   * Smoke failures are diagnostics, not release blockers — the
#     release itself succeeds; this workflow surfaces "tag is published
#     but install path is broken" in a dedicated check.
#
# The matrix mirrors `cross-platform-smoke` in ci.yml so end-user
# install parity stays gated on every supported platform.

on:
  # `release: published` is the documented hook, but in practice it does
  # NOT fire when `release.yml` itself creates the release via the
  # default GITHUB_TOKEN (GitHub disallows token-authenticated workflows
  # from triggering downstream workflows, to prevent infinite loops).
  # We keep it here for the case where someone publishes a draft release
  # manually (which uses the user's PAT and DOES trigger the cascade).
  release:
    types: [published]
  # The reliable auto-trigger: fires after the `Release` workflow
  # completes successfully, regardless of how the release was created.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  # Allow manual re-runs against a specific tag (handy when a prior
  # run timed out on a flaky runner).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to smoke (e.g. v0.34.0). Defaults to the latest published tag.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Skip when triggered by a Release-workflow run that did NOT succeed.
    # (workflow_run fires on every conclusion; we only want to smoke
    # successful releases. The default trigger paths — release-event +
    # workflow_dispatch — bypass this check.)
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Coral via install.sh (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          # Tag resolution by trigger:
          #  - workflow_dispatch: user-supplied `inputs.tag` wins.
          #  - release event: pulled from `github.event.release.tag_name`.
          #  - workflow_run (Release completed): pulled from the parent
          #    workflow's `head_branch` (which IS the tag name when the
          #    Release workflow itself was tag-triggered).
          #  - Otherwise: empty → install.sh resolves `latest`.
          if [ -n "${{ inputs.tag }}" ]; then
            CORAL_VERSION="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            CORAL_VERSION="${{ github.event.release.tag_name }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            CORAL_VERSION="${{ github.event.workflow_run.head_branch }}"
          else
            CORAL_VERSION=""
          fi
          echo "Installing Coral version: ${CORAL_VERSION:-latest}"
          if [ -n "${CORAL_VERSION:-}" ]; then
            curl -fsSL https://raw.githubusercontent.com/agustincbajo/Coral/main/scripts/install.sh \
              | bash -s -- --version "$CORAL_VERSION"
          else
            curl -fsSL https://raw.githubusercontent.com/agustincbajo/Coral/main/scripts/install.sh \
              | bash
          fi

      - name: Install Coral via install.ps1 (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = if ('${{ inputs.tag }}') { '${{ inputs.tag }}' }
                 elseif ('${{ github.event_name }}' -eq 'release') { '${{ github.event.release.tag_name }}' }
                 elseif ('${{ github.event_name }}' -eq 'workflow_run') { '${{ github.event.workflow_run.head_branch }}' }
                 else { '' }
          Write-Output ("Installing Coral version: {0}" -f ($tag, 'latest' -ne '')[0])
          $url = 'https://raw.githubusercontent.com/agustincbajo/Coral/main/scripts/install.ps1'
          # install.ps1 takes `-Version vX.Y.Z` as a param; the `iwr | iex`
          # idiom doesn't forward arguments, so we use the scriptblock
          # invocation pattern documented in install.ps1's own header
          # comments. This keeps a single source of truth for the asset
          # naming convention (vs hand-rolling the asset URL here).
          if ($tag) {
            & ([scriptblock]::Create((iwr -useb $url).Content)) -Version $tag
          } else {
            iwr -useb $url | iex
          }

      - name: Refresh PATH (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # install.sh drops the binary into ~/.coral/bin and patches the
          # shell rc; in a fresh non-interactive workflow shell we have
          # to add it ourselves so the smoke step can resolve `coral`.
          echo "$HOME/.coral/bin" >> $GITHUB_PATH

      - name: Refresh PATH (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # install.ps1 puts the binary in $env:LOCALAPPDATA\Coral\bin
          # by default (see install.ps1 line 32: -InstallDir). Patches
          # the user PATH for new sessions, but the current workflow
          # shell needs an explicit GITHUB_PATH append to resolve
          # `coral` in subsequent steps. Match the installer's default
          # path exactly so smoke steps find the just-installed binary.
          Add-Content $env:GITHUB_PATH "$env:LOCALAPPDATA\Coral\bin"

      - name: Smoke `coral --version`
        shell: bash
        run: |
          set -euo pipefail
          coral --version

      - name: Smoke `coral self-check --quick --format=json`
        shell: bash
        run: |
          set -euo pipefail
          OUT=$(coral self-check --format=json --quick)
          # 8000-char envelope cap (FR-ONB-9). Fail loudly if a future
          # build regresses the cap so the SessionStart hook would
          # truncate silently.
          if [ "${#OUT}" -gt 8000 ]; then
            echo "::error::self-check --quick envelope exceeds 8000-char cap (${#OUT} chars)"
            exit 1
          fi
          # Sanity: required keys per FR-ONB-6 / Appendix F.
          echo "$OUT" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          for k in ('schema_version','coral_status','coral_version','in_path','platform'):
              assert k in d, f'missing {k!r} in self-check envelope: {d}'
          assert d['schema_version'] == 1, f\"schema_version != 1 (got {d['schema_version']!r})\"
          assert d['coral_status'] in ('ok','degraded'), f\"unexpected status {d['coral_status']!r}\"
          assert d['in_path'] is True, 'in_path != true after install'
          "

      - name: Smoke `coral doctor --non-interactive`
        shell: bash
        run: |
          set -euo pipefail
          coral doctor --non-interactive | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert 'schema_version' in d, 'doctor --non-interactive missing schema_version (leaked legacy project-doctor format?)'
          assert 'coral_status' in d, 'doctor --non-interactive missing coral_status'
          "

      - name: Smoke `coral self-upgrade --check-only`
        shell: bash
        env:
          # v0.34.x: `coral self-upgrade` now reads $GITHUB_TOKEN /
          # $GH_TOKEN and adds `Authorization: Bearer <token>` so the
          # quota is 5000 req/hour authenticated vs. 60 unauthenticated.
          # Threading the workflow-default GITHUB_TOKEN through means
          # the three OS matrix legs sharing an egress IP no longer
          # exhaust the budget during a release smoke.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # The warning fallback is preserved as defence-in-depth: if
          # GitHub API has a generic outage (5xx, DNS, etc.), the
          # smoke goal "binary runs end-to-end without panic" is still
          # satisfied even if the network call fails.
          if ! coral self-upgrade --check-only 2>/tmp/upgrade.err; then
            cat /tmp/upgrade.err
            echo "::warning::coral self-upgrade --check-only exited non-zero (GitHub API unreachable or rate-limited). Smoke step continues."
          fi
