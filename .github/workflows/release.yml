name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build release
        run: cargo build --release --workspace --target ${{ matrix.target }}

      # ----- Linux / macOS only: strip + codesign + tar.gz -----
      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/coral || true
      - name: Ad-hoc codesign (macOS)
        # Without this, Gatekeeper rejects the binary on first launch even
        # after the user `xattr`-removes the quarantine flag, because Apple
        # Silicon binaries with no signature at all (not even ad-hoc) are
        # killed at exec time. Ad-hoc signature (`-`) is free, requires no
        # cert, and pacifies that check. Users still see the
        # "unidentified developer" prompt — only Developer ID + notarytool
        # eliminates that, which costs $99/year and isn't worth it yet.
        if: contains(matrix.target, 'apple-darwin')
        run: |
          codesign --force --sign - --timestamp=none --options=runtime \
            target/${{ matrix.target }}/release/coral
          codesign --verify --verbose target/${{ matrix.target }}/release/coral
      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          NAME="coral-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p dist/$NAME
          cp target/${{ matrix.target }}/release/coral dist/$NAME/
          cp README.md LICENSE dist/$NAME/
          cd dist
          tar -czf "$NAME.tar.gz" "$NAME"
          shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"

      # ----- Windows only: package as .zip via PowerShell -----
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $Name = "coral-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist/$Name" -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/coral.exe" "dist/$Name/"
          Copy-Item "README.md" "dist/$Name/"
          Copy-Item "LICENSE"   "dist/$Name/"
          Push-Location dist
          Compress-Archive -Path "$Name" -DestinationPath "$Name.zip" -Force
          $hash = (Get-FileHash -Algorithm SHA256 -Path "$Name.zip").Hash.ToLower()
          # Match the `shasum -a 256` output shape: "<hex>  <filename>\n".
          Set-Content -Path "$Name.zip.sha256" -Value "$hash  $Name.zip" -NoNewline
          Add-Content -Path "$Name.zip.sha256" -Value ""
          Pop-Location

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: coral-${{ matrix.target }}
          # Match either packaging shape; whichever step ran will have populated
          # the right files. `if-no-files-found: error` still catches breakage.
          path: |
            dist/coral-*.tar.gz
            dist/coral-*.tar.gz.sha256
            dist/coral-*.zip
            dist/coral-*.zip.sha256
          if-no-files-found: error

  dxt-bundle:
    name: Build .mcpb (Claude Desktop)
    needs: build
    runs-on: ubuntu-latest
    # ----------------------------------------------------------------------
    # Architecture decision: Option A — single fat .mcpb covering all platforms
    # ----------------------------------------------------------------------
    # We ship ONE `coral-<tag>.mcpb` artifact that contains binaries for all
    # supported platforms, and rely on the MCPB runtime to pick the right one
    # via `mcp_config.platform_overrides`. End users download a single file
    # regardless of OS; Claude Desktop resolves the correct `command` path at
    # launch based on `process.platform`.
    #
    # Why A over B (one bundle per platform):
    #   * The MCPB v0.3 manifest schema (modelcontextprotocol/mcpb,
    #     src/schemas/0.3.ts) defines `mcp_config.platform_overrides` as a
    #     first-class field, keyed by Node-style platform strings
    #     `darwin` / `win32` / `linux`, with each value a partial override of
    #     `command` / `args` / `env`. Per-platform entry resolution is part
    #     of the official spec — not a hack.
    #   * `compatibility.platforms` is `z.enum(["darwin", "win32", "linux"])`,
    #     so we can declare full cross-platform support in one manifest.
    #   * Users get one URL, not four; Claude Desktop's "install extension"
    #     UX never asks the user to pick an OS/arch.
    #
    # The one rough edge: the MCPB spec keys platform_overrides by OS only,
    # not by architecture. macOS has two arches (x86_64-apple-darwin and
    # aarch64-apple-darwin) but only one `darwin` override slot. We resolve
    # this by `lipo`-fusing the two Mach-O slices into a single universal
    # binary at bundle-assembly time, so the bundle's `darwin/coral` is a
    # fat Mach-O that runs natively on both Intel and Apple Silicon.
    # `llvm-lipo` (from the LLVM tools pre-installed on ubuntu-latest) is a
    # drop-in for Apple's `lipo -create` and runs without a macOS host.
    #
    # If the official mcpb packer (`@anthropic-ai/mcpb pack`) is unavailable
    # for any reason, the fallback is a plain `zip -r` since an .mcpb is
    # just a zip of `manifest.json` + bundled files. We keep that fallback
    # path for resilience.
    # ----------------------------------------------------------------------
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Locate llvm-lipo (for universal macOS binary)
        id: lipo
        run: |
          set -euo pipefail
          # ubuntu-latest ships several LLVM toolchains; pick the newest
          # `llvm-lipo` on PATH. `lipo` itself is macOS-only, but llvm-lipo
          # implements the same `-create` operation for Mach-O fat binaries.
          LIPO_BIN=$(command -v llvm-lipo || true)
          if [ -z "$LIPO_BIN" ]; then
            # Fall back to a versioned name (e.g. llvm-lipo-18).
            LIPO_BIN=$(ls /usr/bin/llvm-lipo-* 2>/dev/null | sort -V | tail -n1 || true)
          fi
          if [ -z "$LIPO_BIN" ]; then
            echo "Installing llvm to obtain llvm-lipo..." >&2
            sudo apt-get update -y
            sudo apt-get install -y llvm
            LIPO_BIN=$(command -v llvm-lipo || ls /usr/bin/llvm-lipo-* | sort -V | tail -n1)
          fi
          echo "Using lipo: $LIPO_BIN"
          "$LIPO_BIN" --version || true
          echo "bin=$LIPO_BIN" >> "$GITHUB_OUTPUT"
      - name: Assemble bundle directory (all platforms)
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          BUNDLE="bundle"
          TMP="$BUNDLE/_unpack"
          mkdir -p "$BUNDLE/server/linux" "$BUNDLE/server/darwin" "$BUNDLE/server/win32" "$TMP"

          # ---- Linux x86_64 ------------------------------------------------
          LINUX_TAR="artifacts/coral-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf "$LINUX_TAR" -C "$TMP"
          find "$TMP" -maxdepth 3 -type f -name coral -print \
            -exec cp {} "$BUNDLE/server/linux/coral" \;
          chmod +x "$BUNDLE/server/linux/coral"
          rm -rf "$TMP"/*

          # ---- macOS: lipo-fuse x86_64 + aarch64 into one universal binary -
          DARWIN_X64_TAR="artifacts/coral-${TAG}-x86_64-apple-darwin.tar.gz"
          DARWIN_ARM_TAR="artifacts/coral-${TAG}-aarch64-apple-darwin.tar.gz"
          mkdir -p "$TMP/darwin-x64" "$TMP/darwin-arm64"
          tar -xzf "$DARWIN_X64_TAR" -C "$TMP/darwin-x64"
          tar -xzf "$DARWIN_ARM_TAR" -C "$TMP/darwin-arm64"
          DX64=$(find "$TMP/darwin-x64"  -maxdepth 3 -type f -name coral | head -n1)
          DARM=$(find "$TMP/darwin-arm64" -maxdepth 3 -type f -name coral | head -n1)
          if [ -z "$DX64" ] || [ -z "$DARM" ]; then
            echo "Could not locate one or both macOS slices" >&2
            ls -R "$TMP" || true
            exit 1
          fi
          "${{ steps.lipo.outputs.bin }}" -create "$DX64" "$DARM" \
            -output "$BUNDLE/server/darwin/coral"
          chmod +x "$BUNDLE/server/darwin/coral"
          # Note: we intentionally do NOT re-codesign here. The two input
          # slices are already ad-hoc signed by the build job; llvm-lipo
          # preserves load-command signatures inside each slice. The user
          # still hits Gatekeeper "unidentified developer" on first launch,
          # which is the same behavior as the standalone .tar.gz binary.
          rm -rf "$TMP"/*

          # ---- Windows x86_64 ----------------------------------------------
          WIN_ZIP="artifacts/coral-${TAG}-x86_64-pc-windows-msvc.zip"
          unzip -q "$WIN_ZIP" -d "$TMP"
          WIN_EXE=$(find "$TMP" -maxdepth 3 -type f -name coral.exe | head -n1)
          if [ -z "$WIN_EXE" ]; then
            echo "Could not locate coral.exe in Windows zip" >&2
            ls -R "$TMP" || true
            exit 1
          fi
          cp "$WIN_EXE" "$BUNDLE/server/win32/coral.exe"

          rm -rf "$TMP"

          # ---- Manifest ----------------------------------------------------
          # Patch the version field to match the tag so the bundle's declared
          # version always matches the release tag, even if someone forgot to
          # bump .dxt/manifest.json before tagging.
          VERSION="${TAG#v}" \
            node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('.dxt/manifest.json')); m.version=process.env.VERSION; fs.writeFileSync('$BUNDLE/manifest.json', JSON.stringify(m, null, 2));"

          echo "----- bundle layout -----"
          find "$BUNDLE" -maxdepth 4 -type f | sort
          echo "----- darwin binary archs -----"
          file "$BUNDLE/server/darwin/coral" || true
      - name: Pack .mcpb
        run: |
          set -euo pipefail
          # `npx -y @anthropic-ai/mcpb pack <dir> <output>` is the documented
          # invocation. If the CLI changes name back to @anthropic-ai/dxt, swap
          # the package name; the format is identical.
          OUT="coral-${{ github.ref_name }}.mcpb"
          if ! npx -y @anthropic-ai/mcpb pack bundle "$OUT"; then
            echo "Official packer failed or unavailable; falling back to manual zip."
            (cd bundle && zip -r "../$OUT" .)
          fi
          # Sidecar hash for parity with the tarball sidecars.
          sha256sum "$OUT" > "$OUT.sha256"
          ls -la "$OUT" "$OUT.sha256"
      - name: Upload .mcpb artifact
        uses: actions/upload-artifact@v4
        with:
          name: coral-mcpb
          path: |
            coral-*.mcpb
            coral-*.mcpb.sha256
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: [build, dxt-bundle]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.mcpb
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

  provenance:
    name: SLSA provenance
    needs: release
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects-as-file: ""
      # The SLSA generator attests to the artifacts already uploaded to the
      # release. We reference them via the upload-artifact names produced by
      # the build job. When the generator resolves subjects from uploaded
      # artifacts it produces an in-toto provenance statement attached to
      # the release automatically.
      upload-assets: true
