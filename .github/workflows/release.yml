name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build release
        run: cargo build --release --workspace --target ${{ matrix.target }}
      - name: Strip binary (Linux/macOS)
        run: strip target/${{ matrix.target }}/release/coral || true
      - name: Ad-hoc codesign (macOS)
        # Without this, Gatekeeper rejects the binary on first launch even
        # after the user `xattr`-removes the quarantine flag, because Apple
        # Silicon binaries with no signature at all (not even ad-hoc) are
        # killed at exec time. Ad-hoc signature (`-`) is free, requires no
        # cert, and pacifies that check. Users still see the
        # "unidentified developer" prompt — only Developer ID + notarytool
        # eliminates that, which costs $99/year and isn't worth it yet.
        if: contains(matrix.target, 'apple-darwin')
        run: |
          codesign --force --sign - --timestamp=none --options=runtime \
            target/${{ matrix.target }}/release/coral
          codesign --verify --verbose target/${{ matrix.target }}/release/coral
      - name: Package
        id: package
        run: |
          set -euo pipefail
          NAME="coral-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p dist/$NAME
          cp target/${{ matrix.target }}/release/coral dist/$NAME/
          cp README.md LICENSE dist/$NAME/
          cd dist
          tar -czf "$NAME.tar.gz" "$NAME"
          shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
          echo "asset=$NAME.tar.gz" >> $GITHUB_OUTPUT
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: coral-${{ matrix.target }}
          path: dist/coral-*.tar.gz*
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

  provenance:
    name: SLSA provenance
    needs: release
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects-as-file: ""
      # The SLSA generator attests to the artifacts already uploaded to the
      # release. We reference them via the upload-artifact names produced by
      # the build job. When the generator resolves subjects from uploaded
      # artifacts it produces an in-toto provenance statement attached to
      # the release automatically.
      upload-assets: true
