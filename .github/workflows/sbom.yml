name: SBOM & Supply Chain

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM (CycloneDX)
        run: cargo cyclonedx --format json --output-file coral-${{ github.ref_name }}.cdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SBOM with cosign (keyless)
        run: cosign sign-blob --yes coral-${{ github.ref_name }}.cdx.json --output-signature coral-${{ github.ref_name }}.cdx.json.sig

      - name: Upload SBOM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            coral-${{ github.ref_name }}.cdx.json \
            coral-${{ github.ref_name }}.cdx.json.sig
