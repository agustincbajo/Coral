name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for the same ref. Saves Actions minutes when
# pushes land back-to-back; the latest one wins.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin RUST_BACKTRACE on so panics surface stack traces in failing
  # tests — helps PR debug speed without flooding healthy runs.
  RUST_BACKTRACE: 1
  # Coral's MSRV (matches `rust-version.workspace` in Cargo.toml).
  CORAL_MSRV: "1.85"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        # `--all-features` is load-bearing: it enables the feature-gated
        # `tantivy` and `pgvector` modules in `coral-core`, so their inline
        # tests participate in CI. This is what closes audit cycle 5 item
        # B12 — do NOT drop `--all-features` here without adding a separate
        # matrix row that re-enables them.
        #
        # `RUST_TEST_THREADS=1` mirrors the Coverage job: serial execution
        # is required because the fork-exec tests in `coral-runner` race
        # on Linux's ETXTBSY check even with the in-process
        # `test_script_lock()` Mutex (lock can't cross test-binary
        # boundaries). Costs ~20s wallclock; the alternative was
        # cherry-picking which crates to serialise, which is fragile.
        env:
          RUST_TEST_THREADS: 1
        run: cargo test --workspace --all-features

  msrv:
    # Pin Coral to its declared minimum supported Rust version. If
    # this passes on stable + MSRV, we can promise users that
    # `cargo install --locked --tag vX.Y.Z coral-cli` works on the
    # MSRV they read in the README.
    # NOTE: hard-coded to match `CORAL_MSRV` env above. GitHub Actions
    # does NOT expand `env.X` inside the job-level `name:` field — only
    # in `steps:`. v0.22.5 introduced this expression and the workflow
    # parser silently 422-ed *every push event for 100+ runs* until it
    # was fixed in v0.32.2 (commit history forensic).
    name: Test (MSRV 1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.CORAL_MSRV }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - name: cargo build (MSRV)
        run: cargo build --workspace --locked

  bc-regression:
    # Backward-compat gate: the v0.15 single-repo workflow must keep
    # working on every PR. Runs the dedicated `bc_regression` test
    # suite separately so the failure mode is unambiguous in the UI
    # ("BC broke" vs "some unit test broke").
    name: Backward-compat (v0.15 single-repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --test bc_regression
        run: cargo test --test bc_regression -p coral-cli

  cross-platform-smoke:
    # Coral ships binaries for macOS too. This job catches platform
    # regressions early instead of waiting for the Release workflow
    # to fail at tag time.
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: smoke-${{ matrix.os }}
      - name: cargo build --release
        run: cargo build --release --bin coral
      - name: smoke `coral --version` (unix)
        if: runner.os != 'Windows'
        run: ./target/release/coral --version
      - name: smoke `coral --version` (windows)
        if: runner.os == 'Windows'
        run: ./target/release/coral.exe --version
      # GitHub Actions ships `bash` on every runner (Git Bash on Windows),
      # so `mktemp -d` + `test -f` work uniformly across the matrix as
      # long as we use forward slashes in paths. Windows accepts forward
      # slashes for `coral --wiki-root` (Rust normalises internally) and
      # the `target/release/coral` binary name resolves to `coral.exe`
      # via PATHEXT under Git Bash.
      - name: smoke `coral init` in tempdir
        shell: bash
        run: |
          set -euo pipefail
          TMP="$(mktemp -d)"
          ./target/release/coral --wiki-root "$TMP/.wiki" init
          test -f "$TMP/.wiki/index.md"
          test -f "$TMP/.wiki/log.md"
          test -f "$TMP/.wiki/SCHEMA.md"

  audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    # Don't fail PRs on transitive advisories, but surface them. Production
    # advisories on Coral itself are caught by `deny` below.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        # RUSTSEC-2025-0141 (bincode is unmaintained) is informational,
        # not a security advisory. Migration to bincode 2.x is tracked
        # for a future release; ignoring here keeps the audit gate
        # focused on real vulnerabilities.
        run: cargo audit --deny warnings --ignore RUSTSEC-2025-0141

  deny:
    name: Licenses + duplicate versions (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: cargo deny check
        run: cargo deny --all-features check --hide-inclusion-graph

  coverage:
    name: Coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    # Coverage is informational. Don't block PRs on a transient regression
    # — the test job above is the hard gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        # `RUST_TEST_THREADS=1` forces serial test execution across the
        # whole workspace. Required because `cargo llvm-cov`'s
        # instrumentation widens the ETXTBSY race window for the
        # fork-exec tests in `coral-runner` (the bearer-scrub fixtures
        # specifically) — those tests already coordinate via the
        # `test_script_lock()` Mutex *inside* a single binary, but
        # llvm-cov also parallelises across test binaries, which the
        # in-process lock can't reach. Serial execution sidesteps the
        # whole issue at the cost of ~30s longer wallclock here.
        env:
          RUST_TEST_THREADS: 1
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - name: Print summary line
        env:
          RUST_TEST_THREADS: 1
        run: cargo llvm-cov --workspace --all-features --summary-only
      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov-coverage
          path: lcov.info
          retention-days: 30
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          # Public repo — no token needed for the action; tokenless OAuth
          # works as long as the repo is enabled at app.codecov.io.
