name: CI

on:
  push:
    branches: [main]
    # v0.34.0 onboarding (PRD §7.6): when release.yml's
    # sync-plugin-manifests job pushes a manifest-only bump back to
    # main, it tags the commit with [skip ci] AND we add belt-and-
    # suspenders by ignoring those paths here. Either guard alone is
    # sufficient; together they make a release-time anti-loop
    # impossible. `paths-ignore` only filters `push:` events — `pull_
    # request:` runs CI regardless so a PR touching .claude-plugin/
    # still gets validated.
    paths-ignore:
      - '.claude-plugin/**'
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for the same ref. Saves Actions minutes when
# pushes land back-to-back; the latest one wins.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin RUST_BACKTRACE on so panics surface stack traces in failing
  # tests — helps PR debug speed without flooding healthy runs.
  RUST_BACKTRACE: 1
  # Coral's MSRV (matches `rust-version.workspace` in Cargo.toml).
  # v0.35 Phase C bump: 1.85 -> 1.89. Picks up `let_chains` (stable
  # 1.88) for ergonomic refactors and stays conservative against the
  # current stable (cargo, rustc dropped support for older toolchains).
  # Audit F + validator F confirmed no transitive blocks. ADR-002
  # records the rationale.
  CORAL_MSRV: "1.89"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # v0.35 Phase C added workspace clippy lints (unwrap_used,
      # expect_used, panic = "warn"). They surface ~100 panic-risk
      # sites in production + thousands more in tests. The strict
      # `-D warnings` gate that catches actual regressions therefore
      # has to allow these three lints (otherwise CI fails on day 1
      # of the new lint with no realistic path to zero). The second
      # job below ('Clippy (panic-risk informational)') prints the
      # production-only count so the ratchet plan in BACKLOG.md has
      # a CI artifact to track.
      - name: cargo clippy (strict, except the new panic-risk lints)
        run: |
          cargo clippy --workspace --all-targets -- -D warnings \
            -A clippy::unwrap_used \
            -A clippy::expect_used \
            -A clippy::panic

  clippy-panic-risk:
    # v0.35 Phase C introduced workspace `unwrap_used` / `expect_used` /
    # `panic` lints as warn-only. v0.36 dev batch took the production
    # count 104 -> 45 (-57%) via test-fixture #[allow] + safe-by-
    # construction unwraps. v0.37 prep ratchet took 45 -> 0 by
    # replacing remaining `?`-eligible sites with proper error
    # surfaces and gating documented sites with per-call #[allow]
    # + reason= justifications.
    #
    # As of v0.37 this job is now a HARD gate on production code
    # (lib + bins). Tests still allow these lints via module-level
    # `#[allow]` because test fixtures legitimately need unwrap on
    # known-good inputs; that's why we scope to `--lib --bins` here.
    # The first `clippy` job above remains the workspace gate (all
    # targets) with these three lints suppressed there.
    #
    # If you legitimately need a new unwrap/expect/panic in
    # production code, add a per-call `#[allow(clippy::*, reason =
    # "...")]` with a one-line justification. Do NOT downgrade the
    # workspace lint level.
    name: Clippy (panic-risk, production-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy --lib --bins (deny warnings on production)
        run: cargo clippy --workspace --lib --bins --no-deps -- -D warnings

  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        # `--all-features` is load-bearing: it enables the feature-gated
        # `tantivy` and `pgvector` modules in `coral-core`, so their inline
        # tests participate in CI. This is what closes audit cycle 5 item
        # B12 — do NOT drop `--all-features` here without adding a separate
        # matrix row that re-enables them.
        #
        # `RUST_TEST_THREADS=1` mirrors the Coverage job: serial execution
        # is required because the fork-exec tests in `coral-runner` race
        # on Linux's ETXTBSY check even with the in-process
        # `test_script_lock()` Mutex (lock can't cross test-binary
        # boundaries). Costs ~20s wallclock; the alternative was
        # cherry-picking which crates to serialise, which is fragile.
        env:
          RUST_TEST_THREADS: 1
        run: cargo test --workspace --all-features

  msrv:
    # Pin Coral to its declared minimum supported Rust version. If
    # this passes on stable + MSRV, we can promise users that
    # `cargo install --locked --tag vX.Y.Z coral-cli` works on the
    # MSRV they read in the README.
    # NOTE: hard-coded to match `CORAL_MSRV` env above. GitHub Actions
    # does NOT expand `env.X` inside the job-level `name:` field — only
    # in `steps:`. v0.22.5 introduced this expression and the workflow
    # parser silently 422-ed *every push event for 100+ runs* until it
    # was fixed in v0.32.2 (commit history forensic).
    name: Test (MSRV 1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.CORAL_MSRV }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - name: cargo build (MSRV)
        run: cargo build --workspace --locked

  bc-regression:
    # Backward-compat gate: the v0.15 single-repo workflow must keep
    # working on every PR. Runs the dedicated `bc_regression` test
    # suite separately so the failure mode is unambiguous in the UI
    # ("BC broke" vs "some unit test broke").
    name: Backward-compat (v0.15 single-repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --test bc_regression
        run: cargo test --test bc_regression -p coral-cli

  cross-platform-smoke:
    # Coral ships binaries for macOS too. This job catches platform
    # regressions early instead of waiting for the Release workflow
    # to fail at tag time.
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: smoke-${{ matrix.os }}
      - name: cargo build --release
        run: cargo build --release --bin coral
      - name: smoke `coral --version` (unix)
        if: runner.os != 'Windows'
        run: ./target/release/coral --version
      - name: smoke `coral --version` (windows)
        if: runner.os == 'Windows'
        run: ./target/release/coral.exe --version
      # GitHub Actions ships `bash` on every runner (Git Bash on Windows),
      # so `mktemp -d` + `test -f` work uniformly across the matrix as
      # long as we use forward slashes in paths. Windows accepts forward
      # slashes for `coral --wiki-root` (Rust normalises internally) and
      # the `target/release/coral` binary name resolves to `coral.exe`
      # via PATHEXT under Git Bash.
      - name: smoke `coral init` in tempdir
        shell: bash
        run: |
          set -euo pipefail
          TMP="$(mktemp -d)"
          ./target/release/coral --wiki-root "$TMP/.wiki" init
          test -f "$TMP/.wiki/index.md"
          test -f "$TMP/.wiki/log.md"
          test -f "$TMP/.wiki/SCHEMA.md"

  hook-budget:
    # v0.34.0 FR-ONB-9: the SessionStart hook script must respect the
    # PRD §6.3 latency budget:
    #   * Linux  / macOS p95 < 150 ms
    #   * Windows         p95 < 600 ms
    # We measure with `hyperfine`, which gives mean + std + min + max
    # across N runs. We use `max` as a conservative proxy for p95 on the
    # default 20-run sample (small samples + the runner noise floor make
    # a true percentile calculation flaky; max-of-20 is what hyperfine
    # exports natively and runs ~ p95 in practice).
    #
    # **Windows budget history**: v0.34.0 raised the threshold to 1200ms
    # because the original `Start-Job { coral ... }` pattern spawned a
    # secondary `powershell.exe` host (~500ms cold-start floor),
    # measuring mean=651ms ± 84ms, max=941ms. The v0.34.x patch rewrote
    # the hook to `System.Diagnostics.Process` with async stdout/stderr
    # draining and `WaitForExit($ms)` — dropping the secondary host
    # entirely. Local measurement on a developer laptop: mean=367ms,
    # max=394ms (vs. mean=644ms, max=890ms before). Threshold is now
    # 600ms which keeps regression-catching power (catches a 50%+
    # slowdown) while reflecting the post-rewrite measured floor.
    #
    # The hook needs `coral` on PATH so we cargo-build the binary first
    # and prepend `target/release` to PATH. Each platform installs
    # hyperfine via its native package manager: apt, brew, choco.
    name: Hook budget (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            threshold_ms: 150
            install: 'sudo apt-get update -y && sudo apt-get install -y hyperfine'
          - os: macos-latest
            threshold_ms: 150
            install: 'brew install hyperfine'
          - os: windows-latest
            threshold_ms: 600
            install: 'choco install -y hyperfine'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: hook-${{ matrix.os }}
      - name: Install hyperfine
        shell: bash
        run: ${{ matrix.install }}
      - name: cargo build --release --bin coral
        run: cargo build --release --bin coral
      - name: hyperfine SessionStart hook (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$PWD/target/release:$PATH"
          # Sanity: the wrapper exists + is executable.
          test -x .claude-plugin/scripts/on-session-start
          # 5 warmup runs prime the binary cache; 20 runs is enough for
          # max-of-20 to land near the p95 on a non-isolated runner.
          hyperfine \
            --warmup 5 \
            --runs 20 \
            --export-json hook-bench.json \
            "bash .claude-plugin/scripts/on-session-start.sh"
          # Extract max in seconds + convert to ms with awk (no jq on
          # macOS runners by default; this avoids the dep).
          MAX_S=$(python3 -c "import json; print(json.load(open('hook-bench.json'))['results'][0]['max'])")
          MAX_MS=$(python3 -c "print(int($MAX_S * 1000))")
          echo "max=${MAX_MS}ms threshold=${{ matrix.threshold_ms }}ms"
          if [ "$MAX_MS" -gt "${{ matrix.threshold_ms }}" ]; then
            echo "::error::Hook max latency ${MAX_MS}ms exceeds budget ${{ matrix.threshold_ms }}ms (PRD §6.3 FR-ONB-9)"
            exit 1
          fi
      - name: hyperfine SessionStart hook (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:Path = "$PWD\target\release;$env:Path"
          if (-not (Test-Path '.claude-plugin/scripts/on-session-start.ps1')) {
            throw "hook script missing"
          }
          hyperfine `
            --warmup 5 `
            --runs 20 `
            --export-json hook-bench.json `
            "powershell.exe -NoProfile -ExecutionPolicy Bypass -File .claude-plugin/scripts/on-session-start.ps1"
          $bench = Get-Content hook-bench.json | ConvertFrom-Json
          $maxMs = [int]($bench.results[0].max * 1000)
          $threshold = ${{ matrix.threshold_ms }}
          Write-Output ("max={0}ms threshold={1}ms" -f $maxMs, $threshold)
          if ($maxMs -gt $threshold) {
            Write-Output ("::error::Hook max latency {0}ms exceeds budget {1}ms (PRD §6.3 FR-ONB-9)" -f $maxMs, $threshold)
            exit 1
          }
      - name: Upload hook-bench.json
        uses: actions/upload-artifact@v4
        with:
          name: hook-bench-${{ matrix.os }}
          path: hook-bench.json
          retention-days: 14

  audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    # Don't fail PRs on transitive advisories, but surface them. Production
    # advisories on Coral itself are caught by `deny` below.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        # v0.39.0: RUSTSEC-2025-0141 (bincode unmaintained) was the
        # only ignore in this job. Dropped after `coral-core` migrated
        # from bincode 2.x to postcard 1.x (BACKLOG #7); bincode no
        # longer appears in the dependency graph at all.
        run: cargo audit --deny warnings

  deny:
    name: Licenses + duplicate versions (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: cargo deny check
        run: cargo deny --all-features check --hide-inclusion-graph

  coverage:
    name: Coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    # Coverage IS a gate as of v0.34.x: BACKLOG #5 / PRD §10 KPI ("≥70%"
    # integration coverage). The job runs `cargo llvm-cov` with
    # `--fail-under-lines` to fail when measured coverage drops below the
    # configured floor.
    #
    # NOTE on the floor value (CORAL_COV_MIN_LINES):
    # The 70% target lives in the PRD. We started the gate at a
    # forgiving 55% in v0.34.x and ratchet upward as suites grow. The
    # escalation plan is documented in BACKLOG.md item #5. Bump the env
    # below — do NOT silently widen it back down without a CHANGELOG
    # entry.
    #
    # v0.39.0 (BACKLOG #5 step 2/4): bumped 55 → 60. Measured workspace
    # line coverage at the time of the bump was 83.81% on commit
    # `2e06caa` (84121 LoC instrumented, 13616 missed), so 60% clears
    # with +23.81% margin. The next step (v0.40.0) bumps to 65% once
    # `coral-cli::commands::doctor` wizard paths get end-to-end
    # coverage (currently 39.22%).
    env:
      CORAL_COV_MIN_LINES: "60"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        # `RUST_TEST_THREADS=1` forces serial test execution across the
        # whole workspace. Required because `cargo llvm-cov`'s
        # instrumentation widens the ETXTBSY race window for the
        # fork-exec tests in `coral-runner` (the bearer-scrub fixtures
        # specifically) — those tests already coordinate via the
        # `test_script_lock()` Mutex *inside* a single binary, but
        # llvm-cov also parallelises across test binaries, which the
        # in-process lock can't reach. Serial execution sidesteps the
        # whole issue at the cost of ~30s longer wallclock here.
        env:
          RUST_TEST_THREADS: 1
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - name: Print summary line
        env:
          RUST_TEST_THREADS: 1
        run: cargo llvm-cov --workspace --all-features --summary-only
      # Hard gate: fail the job if the line coverage falls below the
      # floor declared in the job-level env above. `--fail-under-lines`
      # is a first-class cargo-llvm-cov flag; the previous run already
      # produced + cached profraw data, so this second pass only
      # re-summarises (no re-test). Output looks like:
      #   error: 53.42% < 55% lines
      # which surfaces on the Actions log instantly.
      - name: Enforce coverage floor
        env:
          RUST_TEST_THREADS: 1
        run: |
          cargo llvm-cov report \
            --fail-under-lines "${CORAL_COV_MIN_LINES}"
      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov-coverage
          path: lcov.info
          retention-days: 30
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          # Public repo — no token needed for the action; tokenless OAuth
          # works as long as the repo is enabled at app.codecov.io.
