name: Nightly real-API smoke tests

# Runs the `--ignored` real-API smoke tests every night against actual
# providers (Claude, Gemini, Voyage, OpenAI, llama.cpp). The default CI
# (`ci.yml`) runs only the deterministic test suite (608 tests) — these
# smokes need credentials and are too expensive/slow for every push.
#
# Each job exports its required secret to an env var and checks for
# emptiness inside the shell step. If the secret isn't set, the step
# logs a warning and exits 0 (no failure email). To enable a smoke,
# add the corresponding secret at:
#   https://github.com/<owner>/Coral/settings/secrets/actions
#
# Manual trigger: GitHub UI → Actions → Nightly → Run workflow.

on:
  schedule:
    - cron: '0 5 * * *' # 05:00 UTC daily — well after lint cron at 03:00.
  workflow_dispatch:

jobs:
  claude-smoke:
    name: Real Claude smoke (claude_runner_smoke_real_claude)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Claude smoke (skips if CLAUDE_CODE_OAUTH_TOKEN missing)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN not set; skipping real-Claude smoke."
            echo "Add it at https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 0
          fi
          npm install -g @anthropic-ai/claude-code
          cargo test -p coral-runner --lib claude_runner_smoke_real_claude -- --ignored --nocapture

  gemini-smoke:
    name: Real Gemini smoke (gemini_runner_smoke_real_gemini)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Gemini smoke (skips if GEMINI_API_KEY missing)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::warning::GEMINI_API_KEY not set; skipping real-Gemini smoke."
            exit 0
          fi
          npm install -g @google/gemini-cli
          cargo test -p coral-runner --lib gemini_runner_smoke_real_gemini -- --ignored --nocapture

  voyage-smoke:
    name: Real Voyage embeddings smoke (voyage_provider_smoke_real_voyage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Voyage smoke (skips if VOYAGE_API_KEY missing)
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: |
          if [ -z "$VOYAGE_API_KEY" ]; then
            echo "::warning::VOYAGE_API_KEY not set; skipping real-Voyage smoke."
            exit 0
          fi
          cargo test -p coral-runner --lib voyage_provider_smoke_real_voyage -- --ignored --nocapture

  openai-smoke:
    name: Real OpenAI embeddings smoke (openai_provider_smoke_real_openai)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run OpenAI smoke (skips if OPENAI_API_KEY missing)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::OPENAI_API_KEY not set; skipping real-OpenAI smoke."
            exit 0
          fi
          cargo test -p coral-runner --lib openai_provider_smoke_real_openai -- --ignored --nocapture

  stress-tests:
    name: 200-page wiki stress tests (no secrets needed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run stress tests
        run: cargo test -p coral-cli --test stress_large_wiki -- --ignored --nocapture
