name: OpenSSF Scorecard
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

permissions: read-all

jobs:
  scorecard:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        # `@v2` was retired upstream — runs failed with `unable to find
        # version v2`. Pin to a specific 2.4.x tag (current major branch)
        # so dependency-update bots can bump us deliberately rather than
        # silently breaking when OSSF renames a major. v2.4.2 was the
        # latest tag at the time of this bump (post v0.34.1).
        uses: ossf/scorecard-action@v2.4.2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
