# cargo-deny configuration for Coral.
#
# Run locally: `cargo deny --all-features check`.
# CI runs this on every push/PR via .github/workflows/ci.yml.
#
# Goals:
#  - Allow only OSI-approved permissive licenses (MIT/Apache style).
#  - Catch duplicate versions of the same crate (multiple semver-incompatible
#    copies bloat the binary; one or two are usually unavoidable from
#    transitive deps, so we warn rather than deny).
#  - Block known security advisories on direct deps (cargo-audit also runs
#    in a separate job for the broader transitive view).

[graph]
all-features = true

[output]
feature-depth = 1

[advisories]
yanked = "warn"
ignore = [
    # bincode 1.x is unmaintained per RUSTSEC-2025-0141. Used for the
    # persisted BM25 search index in `coral-core`. Not a security
    # vulnerability, just no longer accepting bug fixes upstream.
    # Migration to bincode 2.x is tracked for a future release; the
    # encode/decode surface we use is stable.
    "RUSTSEC-2025-0141",
]

[licenses]
# Spell each allowed license explicitly. Add as needed; grep-able log.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
]
confidence-threshold = 0.93

[bans]
# A few duplicates are unavoidable as the ecosystem migrates major
# versions (e.g. base64, syn 1 vs 2). Surface them as warnings, don't
# block PRs.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# Hand-curated allowlist for known/expected duplicates. Empty for now;
# add `{ name = "foo" }` entries when transitive deps unavoidably ship
# multiple semver-incompatible copies.
skip = []

[sources]
# Disallow git deps not pinned to a tag/rev — drift risk.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
