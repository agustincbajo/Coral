# release.toml — config for cargo-release
# Run: cargo release X.Y.Z

# Version each workspace member to the same X.Y.Z
shared-version = true

# Update CHANGELOG.md when releasing
pre-release-replacements = [
  { file = "CHANGELOG.md", search = "## \\[Unreleased\\]", replace = "## [Unreleased]\n\n## [{{version}}] - {{date}}" },
  { file = "CHANGELOG.md", search = "\\[Unreleased\\]: https://github.com/agustincbajo/Coral/compare/v.*\\.\\.\\.HEAD", replace = "[Unreleased]: https://github.com/agustincbajo/Coral/compare/v{{version}}...HEAD\n[{{version}}]: https://github.com/agustincbajo/Coral/releases/tag/v{{version}}", exactly = 1 },
]

# Don't publish to crates.io automatically (yet)
publish = false

# Push the tag and commit
push = true
push-options = ["--tags"]

# Tag format
tag-name = "v{{version}}"
tag-message = "Coral v{{version}}"

# Don't allow releasing a dirty working tree
allow-branch = ["main"]
